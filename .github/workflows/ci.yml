# ============================================================================
# IBMP CRM — Continuous Integration Pipeline
# ============================================================================
# Runs on every push and pull-request to main / develop.
#
# Jobs:
#   backend-lint    — ruff static analysis (pinned version)
#   backend-test    — pytest with coverage (SQLite; no live Supabase needed)
#   frontend-lint   — ESLint
#   frontend-build  — React production build (catches broken imports)
#   security-scan   — Trivy advisory scan on Python requirements
#   ci-gate         — single required status check for branch protection
# ============================================================================

name: CI

on:
  push:
    branches: [main, develop, "feature/**", "fix/**"]
  pull_request:
    branches: [main, develop]

# Cancel in-flight runs for the same branch when a new commit arrives
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.11"
  NODE_VERSION:   "20"

# ── BACKEND LINT ──────────────────────────────────────────────────────────────
jobs:
  backend-lint:
    name: "Backend — Lint (ruff)"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-ai/crm/backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: lead-ai/crm/backend/requirements.txt

      # Pin ruff so lint rules don't silently change between runs
      - name: Install ruff
        run: pip install "ruff==0.4.7"

      - name: Lint (ruff check)
        run: ruff check . --output-format=github

      - name: Format check (ruff format)
        run: ruff format --check .


# ── BACKEND TESTS ─────────────────────────────────────────────────────────────
  backend-test:
    name: "Backend — Tests (pytest + coverage)"
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: lead-ai/crm/backend

    env:
      DATABASE_URL:   "sqlite:///./test.db"
      SECRET_KEY:     "ci-test-secret-key-not-for-production-must-be-32-chars-long!!"
      ALGORITHM:      "HS256"
      ENVIRONMENT:    "test"
      LOG_LEVEL:      "WARNING"
      OPENAI_API_KEY: ""        # AI features are mocked in tests

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: lead-ai/crm/backend/requirements.txt

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install test tools
        run: pip install pytest pytest-asyncio pytest-cov httpx

      - name: Validate all .py files parse (AST check)
        run: |
          python3 - <<'PYEOF'
          import ast, os, sys
          errors = []
          for root, dirs, files in os.walk("."):
              dirs[:] = [d for d in dirs if d not in ("__pycache__", ".venv")]
              for f in files:
                  if not f.endswith(".py"):
                      continue
                  path = os.path.join(root, f)
                  try:
                      ast.parse(open(path).read())
                  except SyntaxError as e:
                      errors.append(f"{path}: {e}")
                      print(f"❌  {path}: {e}")
          if errors:
              print(f"\n{len(errors)} syntax error(s) found.")
              sys.exit(1)
          print("✅  All Python files are syntactically valid.")
          PYEOF

      - name: Run pytest
        run: |
          # Create a minimal smoke-test if the tests/ directory doesn't exist yet
          if [ ! -d tests ]; then
            mkdir -p tests
            cat > tests/test_smoke.py << 'EOF'
          """Smoke tests — verify routers import without error."""
          import sys, os
          sys.path.insert(0, os.path.dirname(os.path.dirname(__file__)))

          def test_auth_router_imports():
              """auth_router should be importable."""
              import importlib
              spec = importlib.util.spec_from_file_location(
                  "auth_router", "routers/auth_router.py"
              )
              assert spec is not None

          def test_system_router_imports():
              import importlib
              spec = importlib.util.spec_from_file_location(
                  "system_router", "routers/system_router.py"
              )
              assert spec is not None

          def test_env_secret_key():
              """SECRET_KEY must be set (not empty) for JWT to work."""
              key = os.getenv("SECRET_KEY", "")
              assert len(key) >= 32, "SECRET_KEY too short — JWTs will be insecure"
          EOF
            echo "ℹ️  Created minimal smoke tests (add real tests to tests/)"
          fi

          pytest tests/ \
            --tb=short \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=5 \
            -q

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: lead-ai/crm/backend/coverage.xml
          retention-days: 14

      - name: Codecov upload
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: lead-ai/crm/backend/coverage.xml
          flags: backend
          fail_ci_if_error: false


# ── FRONTEND LINT ─────────────────────────────────────────────────────────────
  frontend-lint:
    name: "Frontend — ESLint"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: lead-ai/crm/frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-ai/crm/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Run ESLint
        # --max-warnings=50 lets existing warnings pass but blocks new ones
        run: npx eslint src/ --max-warnings=50 --format=compact


# ── FRONTEND BUILD ────────────────────────────────────────────────────────────
  frontend-build:
    name: "Frontend — Production Build"
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: lead-ai/crm/frontend

    env:
      REACT_APP_API_URL: "https://ibmpcrm-api.onrender.com"
      # Prevent CRA from turning warnings into errors
      CI: "false"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: lead-ai/crm/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build
        run: npm run build

      - name: Report bundle sizes
        run: |
          echo "=== Build output size ==="
          du -sh build/
          echo "=== JS chunks > 100 KB ==="
          find build/static/js -name "*.js" -size +100k \
            -exec du -h {} \; | sort -rh | head -10

      - name: Upload build artefact (main branch only)
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: react-build-${{ github.sha }}
          path: lead-ai/crm/frontend/build/
          retention-days: 7


# ── SECURITY SCAN ─────────────────────────────────────────────────────────────
  security-scan:
    name: "Security — Trivy (advisory)"
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Trivy — scan Python requirements
        uses: aquasecurity/trivy-action@master
        with:
          scan-type:      "fs"
          scan-ref:       "lead-ai/crm/backend/requirements.txt"
          format:         "table"
          severity:       "CRITICAL,HIGH"
          exit-code:      "0"   # advisory — never blocks merge
          ignore-unfixed: true


# ── CI GATE ───────────────────────────────────────────────────────────────────
# Single status check to set as "required" in branch protection rules.
# Evaluates all critical jobs and fails if any of them failed.
  ci-gate:
    name: "✅ CI Gate"
    runs-on: ubuntu-latest
    needs:
      - backend-lint
      - backend-test
      - frontend-lint
      - frontend-build
    if: always()

    steps:
      - name: Evaluate job results
        run: |
          python3 - <<'PYEOF'
          import json, sys
          results = {
              "backend-lint":   "${{ needs.backend-lint.result }}",
              "backend-test":   "${{ needs.backend-test.result }}",
              "frontend-lint":  "${{ needs.frontend-lint.result }}",
              "frontend-build": "${{ needs.frontend-build.result }}",
          }
          failed = [job for job, status in results.items() if status not in ("success", "skipped")]
          if failed:
              print(f"❌  CI gate FAILED — these jobs did not pass: {', '.join(failed)}")
              for job, status in results.items():
                  icon = "✅" if status in ("success", "skipped") else "❌"
                  print(f"  {icon}  {job}: {status}")
              sys.exit(1)
          print("✅  All required CI jobs passed!")
          for job, status in results.items():
              print(f"  ✅  {job}: {status}")
          PYEOF
