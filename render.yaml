services:
  - type: web
    name: ibmp-crm-backend
    runtime: python
    python: "3.12"
    rootDir: lead-ai/crm/backend
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && pip install catboost==1.2.10 || echo "catboost install skipped — ML scoring will use rule-based fallback"
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.0"
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_HOURS
        value: "24"
      - key: ALLOWED_ORIGINS
        sync: false
      - key: GOOGLE_SHEETS_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_ID
        value: "1icOnwhO-kqdw-h716CBuQ01J5Anhl-SwqXBctY0qfZU"
